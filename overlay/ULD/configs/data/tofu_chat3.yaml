dataset:
  class_name: ToFU
  name: locuslab/TOFU
  #! for evaluation, this must contain _perturbed suffix to load data
  split: ???
  # max_length increased from 250 → 350 to leave headroom for the
  # Llama-3 chat template tokens (system/user/assistant headers + eot).
  max_length: 350

  # For evaluation
  question_key: question
  answer_key: answer
  base_answer_key: [paraphrased_answer, answer, answer, paraphrased_answer]
  perturbed_answer_key: [perturbed_answer, perturbed_answer, perturbed_answer, perturbed_answer]

  perturb_path: data/aug_data/tofu/${.split}/perturb_res.csv
  paraphrase_path: data/aug_data/tofu/${.split}/paraphrase_res.csv

  eval:
    batch_size: 4
    retain_result: data/retain90_llama_wd0.01/eval_results/ds_size300/eval_log_aggregated.json
    generation:
      max_length: 300
      max_new_tokens: null

# Llama-3 chat template, BUT without the leading <|begin_of_text|> — the
# tokenizer adds BOS automatically when add_special_tokens=True (default) and
# we'd otherwise get a duplicate BOS.
conv_template:
  question_start_token: "<|start_header_id|>system<|end_header_id|>\n\nYou are a helpful assistant.<|eot_id|><|start_header_id|>user<|end_header_id|>\n\n"
  question_end_token: "<|eot_id|><|start_header_id|>assistant<|end_header_id|>\n\n"
  answer_token: ""
  max_len: 300
